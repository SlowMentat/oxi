<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<head>
    <title>Sending Email with Thymeleaf HTML Template Example</title>

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="http://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans|Roboto" rel="stylesheet">
</head>
<body style="margin: 0;padding: 0;">
    <div style="
        width: 35%;
        margin: auto;
        --svg-padding-top: 12.5px;"
    >
        <div style="
            background-color: #f9f9f9;
            height: 150px;
            padding-left: 10px;"
        >
            <div style="
                width: 85px;
                margin: auto;
                height: 75px;
                margin-top: 50px;
                display: inline-block;"
            >
                <svg width="100" height="100" version="1.1" viewBox="0 0 75 40" style="/* position: absolute; *//* width: auto; */
                    height: calc(100% - var(--    svg-padding-top));
                    width: 150px;padding-top: var(--svg-padding-top);margin-left: -38px;"
                >
                    <g transform="translate(0,-10)">
                        <g stroke="#53464c" stroke-dashoffset="15.118" stroke-linecap="round" stroke-linejoin="round">
                            <rect transform="matrix(-.70713 -.70708 -.70708 .70713 0 0)" x="-56.769" y="-26.806" width="10.515" height="10.515" ry="1.894" fill="#6dd7b4"      stroke-width=".39862">                        
                            </rect>
                            <rect transform="matrix(-.70786 .70635 .70635 .70786 0 0)" x="-13.817" y="34.13" width="7.4102" height="22.627" ry=".83804" fill="#feffff"      stroke-width=".49076">                        
                            </rect>
                            <rect transform="matrix(-.70786 .70635 .70635 .70786 0 0)" x="-4.0014" y="24.336" width="7.4102" height="22.627" ry=".83804" fill="#70ccf4"      stroke-width=".49076">                        
                            </rect>
                        </g>
                    </g>
                </svg>
            </div>
            <div style="
                position: relative;
                --font-size-welcome: 28px;
                line-height: 75px;
                display: inline-block;
                width: calc(100% - 150px);
                margin-top: 50px;
                vertical-align: top;
                margin-left: 20px;
                height: 75px;"
            >
                <div style="
                    position: absolute;
                    height: var(--font-size-welcome);
                    line-height: var(--font-size-welcome);
                    font-family: 'Open Sans', sans-serif;
                    font-size: var(--font-size-welcome);
                    top: var(--svg-padding-top);
                    color: #636363;"
                >
                    Welcome to the oxisalechannel community
                </div>
            </div>    
        </div>
        <div style="
            --div-spacing-1: 40px;
            margin-top: var(--div-spacing-1);
            margin-left: 10px;"
        >
            <div style="
                margin-left: 0px;
                font-family: sans-serif;
                --font-size-description: 18px;
                font-size: var(--font-size-description);
                line-height: var(--font-size-description);
                font-family: 'Open Sans', sans-serif;
                height: var(--font-size-description);
                color: #8e8e8e;"
            >
                Select the link below to complete registration.
            </div>
            <div style="
                --button-height: 50px;
                --button-border-width: 2px;
                height: calc(var(--button-border-width) + var(--button-height));
                margin-top: var(--div-spacing-1);
                position: relative;"
            >
                <div style="
                    --button-width: 120px;
                    width: var(--button-width);
                    height: var(--button-height);
                    line-height: var(--button-height);
                    font-size: 15px;
                    border: solid var(--button-border-width) #f9f9f900;
                    border-radius: 4px;
                    text-align: center;
                    position: absolute;
                    bottom: 0px;
                    cursor: pointer;
                    font-family: 'Roboto', sans-serif;
                    background-color: #636363;
                    color: #f9f9f9;
                    letter-spacing: 1px;"
                >
                    Confirm Email
                </div>
            </div>
        </div>
    </div>
</body>
